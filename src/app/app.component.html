<main class="app-shell">
    @if (isSpotlightVisible && spotlightTicket) {
    <div class="draw-spotlight" [style.background]="getSpotlightOverlayBackground(spotlightTicket.colorHex)"
        aria-live="assertive" aria-label="Visning af trukket lod">
        <div class="spotlight-content">
            <p class="spotlight-label">Lod trukket</p>
            <div class="spotlight-bee" aria-hidden="true"></div>
            <div class="spotlight-ticket" [style.background]="spotlightTicket.colorHex"
                [style.color]="getReadableTextColor(spotlightTicket.colorHex)">
                #{{ spotlightTicket.number }}
            </div>
            <p class="spotlight-color">
                {{ spotlightTicket.colorLabel }} lod
            </p>
        </div>
    </div>
    }

    <header class="hero">
        <img class="hero-logo" src="assets/bilogo.png" alt="Danmarks Biavlerforening logo">
        <div class="hero-copy">
            <h1>Danmarks Biavlerforenings Tombola</h1>
            <p>Tænd slyngen og træk et nummer.</p>
        </div>
    </header>

    <div class="content-grid">
        <section class="main-column">
            <app-tombola-machine [latestTicket]="latestTicket" [statusText]="statusText"
                [remainingCount]="remainingCount()" [totalCount]="totalCount()" [isDrawing]="isDrawing"
                [isSpinning]="isSpinning" [isExhausted]="isExhausted" (drawRequested)="onDrawRequested()"
                (resetRequested)="onResetRequested()" [settings]="settings()"
                (settingsSaved)="onSettingsSaved($event)"></app-tombola-machine>
        </section>

        <aside class="results-column">
            <app-results-table [drawnTickets]="drawnTickets()"></app-results-table>
        </aside>
    </div>
</main>
