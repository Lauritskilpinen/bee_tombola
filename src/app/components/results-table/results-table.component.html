<section class="results-card" aria-label="Resultater for trukne lodder">
    <div class="results-header">
        <h2>Resultater</h2>
        <span class="count-pill">{{ drawnTickets.length }}</span>
    </div>

    @if (drawnTickets.length === 0) {
    <p class="empty-state">Ingen lodder trukket endnu.</p>
    } @else {
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th scope="col">Rækkefoelge</th>
                    <th scope="col">Nummer</th>
                    <th scope="col">Farve</th>
                </tr>
            </thead>
            <tbody>
                @for (ticket of drawnTickets; track trackByOrder($index, ticket)) {
                <tr>
                    <td>{{ ticket.order }}</td>
                    <td>#{{ ticket.number }}</td>
                    <td>
                        <span class="color-pill" [style.background]="ticket.colorHex"
                            [style.color]="getReadableTextColor(ticket.colorHex)">
                            {{ ticket.colorLabel }}
                        </span>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    }
</section>
